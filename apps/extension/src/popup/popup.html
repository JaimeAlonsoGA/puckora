<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puckora</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: 280px;
            padding: 16px;
            margin: 0;
            background: #0a0a0a;
            color: #ededed;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #888;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #888;
        }

        .dot.connected {
            background: #22c55e;
        }

        .dot.disconnected {
            background: #ef4444;
        }

        .login-prompt {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }

        a {
            color: #818cf8;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Puckora</h1>
    </div>
    <div class="status">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Checking...</span>
    </div>
    <p class="login-prompt" id="login-prompt" style="display:none">
        <a href="https://app.puckora.com/login" target="_blank">Log in to Puckora</a> to start researching.
    </p>
    <script src="popup.js"></script>
</body>

</html>
